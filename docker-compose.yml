# docker-compose.yml – Hito 3: stack de visualización con Grafana + PostgreSQL
#
# Servicios:
#   db        -> PostgreSQL 16, almacena la tabla `students` (la carga load_db.py)
#   grafana   -> Grafana con datasource y dashboard provisionados automáticamente
#   renderer  -> grafana-image-renderer, para exportar los paneles a PNG
#
# Uso:
#   docker compose up -d
#   python src/load_db.py        # carga el CSV a la base
#   abrir http://localhost:3000  (anónimo, sin login)

services:
  db:
    image: postgres:16
    container_name: tpi_postgres
    environment:
      POSTGRES_DB: tpi
      POSTGRES_USER: tpi
      POSTGRES_PASSWORD: tpi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpi -d tpi"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tpi_grafana
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Acceso anónimo como Admin: se entra directo al dashboard sin login y el
      # renderer puede capturar las imágenes. No hace falta usuario ni contraseña.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_USERS_DEFAULT_THEME: "light"
      # Renderizado de imágenes (servicio renderer)
      GF_RENDERING_SERVER_URL: "http://renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
      GF_LOG_FILTERS: "rendering:debug"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  renderer:
    image: grafana/grafana-image-renderer:3.11.5
    container_name: tpi_renderer
    environment:
      ENABLE_METRICS: "false"
    ports:
      - "8081:8081"

volumes:
  pgdata:
